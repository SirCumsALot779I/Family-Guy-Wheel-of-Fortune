<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>felix drehen</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <audio id="tickSound" src="assets/he.mp3" preload="auto"></audio>
    <button class="spin-btn" id="spin-left-btn" onclick="getRandomNumber_left()">SPIN LEFT</button>
    <button class="spin-btn" id="spin-right-btn" onclick="getRandomNumber_right()">SPIN RIGHT</button>
    <button id="reset-btn" onclick="resetWheelRotation()">RESET</button>


    <div class="container">

        <img src="assets/image.png" alt="wix Bild">
        <svg id="svg" width="700" height="700" viewBox="0 0 300 300">
            <g id="wheel"></g>
        </svg>
        <div class="panel">
            <div class="add-row">
                <input type="text" id="nameInput" placeholder="Name eingeben …" />
                <button class="btn-add" id="addBtn">+</button>
            </div>
            <ul class="name-list" id="nameList">
                <li class="name-item"><span class="name-text">Lois</span><button class="btn-remove">−</button></li>
                <li class="name-item"><span class="name-text">Meg</span><button class="btn-remove">−</button></li>
            </ul>
            <p class="error-hint hidden" id="errorHint">Mindestens 2 Einträge erforderlich.</p>
            <p class="empty-hint" id="emptyHint" style="display:none">Noch keine Namen. Füge welche hinzu!</p>
        </div>
    </div>

    <div id="winner">
        Gewinner: -
    </div>
  
    <script src="script/script.js"></script>
</body>
</html>
