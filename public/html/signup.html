<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="shortcut icon" type="image/x-icon" href="/img/logo.png" />
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth-widget.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/login-page.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/legal-links.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>
<body>
<div class="wrapper">
    <main>
        <section aria-label="Signup Form" class="form-wrapper">
            <form id="signupForm" action="login.html" method="post" autocomplete="on">
                <h2>Signup</h2>

                <div class="input-field">
                    <label for="signupUser">Username</label>
                    <input type="text" id="signupUser" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" required />
                </div>

                <div class="input-field">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" name="email" autocomplete="email" inputmode="email" required />
                </div>

                <div class="input-field">
                    <label for="signupDateOfBirth">Geburtsdatum</label>
                    <input type="date" id="signupDateOfBirth" name="bday" autocomplete="bday" required />
                </div>

                <div class="input-field">
                    <label for="signupPassword">Passwort</label>
                    <input type="password" id="signupPassword" name="password" autocomplete="new-password" required />
                </div>

                <div class="input-field">
                    <label for="signupConfirmPassword">Confirm Passwort</label>
                    <input type="password" id="signupConfirmPassword" name="password_confirmation" autocomplete="new-password" required />
                </div>

                <button type="submit">Sign Up</button>

                <div class="register">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>

                <div class="Rechtliches">
                    <a href="imprint.html" class="btn-ImP">Impressum</a>
                    <a href="privacy.html" class="btn-DaS">Datenschutz</a>
                </div>
            </form>
        </section>
    </main>
</div>

<script type="module" src="../script/app/auth.ts"></script>
</body>
</html>
